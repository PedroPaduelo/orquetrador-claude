<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>04 - API Endpoints | Orquetrador Claude System Map</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    /* Method badges */
    .method-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 68px;
      padding: 3px 10px;
      border-radius: 6px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .method-GET    { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
    .method-POST   { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .method-PUT    { background: rgba(245,158,11,0.15); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
    .method-PATCH  { background: rgba(139,92,246,0.15); color: #c084fc; border: 1px solid rgba(139,92,246,0.3); }
    .method-DELETE { background: rgba(239,68,68,0.15); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }

    /* Tabs override for domain tabs */
    .domain-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 0.35rem;
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }
    .domain-tab {
      padding: 0.4rem 0.85rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }
    .domain-tab:hover { color: var(--text-primary); border-color: rgba(13,148,136,0.4); }
    .domain-tab.active {
      color: var(--text-accent);
      background: var(--bg-accent-subtle);
      border-color: var(--border-accent);
    }
    .domain-tab .count {
      font-size: 0.65rem;
      opacity: 0.6;
      margin-left: 0.3rem;
    }

    /* Method filter pills */
    .method-filters {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
    }
    .method-filter {
      padding: 0.35rem 0.85rem;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'JetBrains Mono', monospace;
      border: 1px solid var(--border-color);
      background: var(--bg-card);
      color: var(--text-secondary);
      opacity: 0.7;
    }
    .method-filter:hover { opacity: 1; }
    .method-filter.active { opacity: 1; transform: scale(1.05); }
    .method-filter[data-method="ALL"].active { background: var(--bg-accent-subtle); color: var(--text-accent); border-color: var(--border-accent); }
    .method-filter[data-method="GET"].active { background: rgba(59,130,246,0.15); color: #60a5fa; border-color: rgba(59,130,246,0.4); }
    .method-filter[data-method="POST"].active { background: rgba(34,197,94,0.15); color: #4ade80; border-color: rgba(34,197,94,0.4); }
    .method-filter[data-method="PUT"].active { background: rgba(245,158,11,0.15); color: #fbbf24; border-color: rgba(245,158,11,0.4); }
    .method-filter[data-method="PATCH"].active { background: rgba(139,92,246,0.15); color: #c084fc; border-color: rgba(139,92,246,0.4); }
    .method-filter[data-method="DELETE"].active { background: rgba(239,68,68,0.15); color: #f87171; border-color: rgba(239,68,68,0.4); }

    /* Endpoint rows */
    .endpoint-row {
      display: grid;
      grid-template-columns: 76px 1fr;
      gap: 0.75rem;
      align-items: start;
      padding: 0.65rem 1rem;
      border-bottom: 1px solid var(--border-color);
      transition: background 0.15s;
    }
    .endpoint-row:last-child { border-bottom: none; }
    .endpoint-row:hover { background: var(--bg-card-hover); }
    .endpoint-path {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.82rem;
      color: var(--text-primary);
      word-break: break-all;
    }
    .endpoint-path .param { color: #fbbf24; }
    .endpoint-desc {
      font-size: 0.78rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
    }
    .endpoint-auth {
      font-size: 0.65rem;
      font-weight: 600;
      margin-left: 0.5rem;
      padding: 1px 6px;
      border-radius: 4px;
    }
    .auth-jwt { background: rgba(34,197,94,0.12); color: #4ade80; }
    .auth-public { background: rgba(100,116,139,0.12); color: #94a3b8; }
    .auth-admin { background: rgba(239,68,68,0.12); color: #f87171; }

    /* Domain panel header */
    .domain-panel-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .domain-icon {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }
    .domain-panel-title {
      font-size: 1.2rem;
      font-weight: 700;
    }
    .domain-panel-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      padding: 2px 8px;
      background: var(--bg-secondary);
      border-radius: 10px;
    }

    /* Search enhancements */
    .search-results-count {
      position: absolute;
      right: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.75rem;
      color: var(--text-muted);
    }
    .search-box input { padding-right: 5rem; }

    /* Summary stats */
    .api-stats {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }
    @media (max-width: 900px) {
      .api-stats { grid-template-columns: repeat(4, 1fr); }
    }
    @media (max-width: 600px) {
      .api-stats { grid-template-columns: repeat(3, 1fr); }
      .endpoint-row { grid-template-columns: 64px 1fr; gap: 0.5rem; }
      .method-badge { min-width: 56px; font-size: 0.65rem; }
    }

    /* No results */
    .no-results {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-muted);
    }
    .no-results-icon { font-size: 3rem; opacity: 0.3; margin-bottom: 1rem; }

    /* Domain panel */
    .domain-panel { display: none; }
    .domain-panel.active { display: block; }

    /* Filter toolbar */
    .filter-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 600px) {
      .filter-toolbar { flex-direction: column; align-items: stretch; }
    }
  </style>
</head>

  <div class="page-container">

    <!-- Header -->

        <span>04 - API Endpoints</span>

      <h1>API Endpoints</h1>

    <!-- Method Filters -->

        <button class="method-filter" data-method="DELETE" onclick="setMethodFilter('DELETE')">DELETE</button>

    </div>

    <!-- Domain Tabs -->
    <div class="domain-tabs" id="domainTabs"></div>

    <!-- Endpoint Panels -->
    <div id="endpointPanels"></div>

  </div>

  { method:'DELETE', path:'/git/accounts/:id',     domain:'Git',      auth:'jwt', desc:'Deletar conta git (cascade para project mappings)' },
  { method:'GET',    path:'/git/accounts/:id/repos', domain:'Git',   auth:'jwt', desc:'Listar repos de uma conta git especifica' },
  { method:'GET',    path:'/git/project-account',  domain:'Git',      auth:'jwt', desc:'Obter conta git vinculada a um project path' },
  { method:'POST',   path:'/git/clone',            domain:'Git',      auth:'jwt', desc:'Clonar repositorio GitHub para pasta do usuario' },
  { method:'POST',   path:'/git/status',           domain:'Git',      auth:'jwt', desc:'Status git de um projeto (branch, ahead, behind)' },
  { method:'POST',   path:'/git/pull',             domain:'Git',      auth:'jwt', desc:'Pull latest changes com rebase' },
  { method:'POST',   path:'/git/push',             domain:'Git',      auth:'jwt', desc:'Push commits para remote (requer token)' },

  // Git Sources (4)
  { method:'GET',    path:'/resources/:resourceType/:resourceId/git-source', domain:'Git Sources', auth:'jwt', desc:'Obter git source de um recurso' },
  { method:'PUT',    path:'/resources/:resourceType/:resourceId/git-source', domain:'Git Sources', auth:'jwt', desc:'Criar ou atualizar git source de um recurso' },
  { method:'DELETE', path:'/resources/:resourceType/:resourceId/git-source', domain:'Git Sources', auth:'jwt', desc:'Deletar git source de um recurso' },
  { method:'GET',    path:'/git-sources',          domain:'Git Sources', auth:'jwt', desc:'Listar git sources por tipo de recurso' },

  // Admin (5)
  { method:'GET',    path:'/admin/users',          domain:'Admin',    auth:'admin', desc:'Listar todos os usuarios (admin only)' },
  { method:'PUT',    path:'/admin/users/:id/role', domain:'Admin',    auth:'admin', desc:'Alterar role do usuario (admin only)' },
  { method:'DELETE', path:'/admin/users/:id',      domain:'Admin',    auth:'admin', desc:'Deletar usuario (nao pode deletar a si mesmo)' },
  { method:'GET',    path:'/admin/audit-logs',     domain:'Admin',    auth:'admin', desc:'Listar audit logs com paginacao e filtros' },
  { method:'GET',    path:'/admin/audit-logs/:id', domain:'Admin',    auth:'admin', desc:'Detalhe de um audit log' },
  { method:'POST',   path:'/admin/metrics/aggregate', domain:'Admin', auth:'admin', desc:'Trigger manual da agregacao de metricas diarias' },
  { method:'POST',   path:'/admin/metrics/backfill', domain:'Admin',  auth:'admin', desc:'Preencher metricas dos ultimos N dias' },
  { method:'GET',    path:'/admin/token-usage/hourly', domain:'Admin', auth:'admin', desc:'Uso de tokens por hora (admin)' },
  { method:'GET',    path:'/admin/resource-performance', domain:'Admin', auth:'admin', desc:'Metricas de performance de um recurso (admin)' },

  // Tags (7)
  { method:'GET',    path:'/tags',                 domain:'Tags',     auth:'jwt', desc:'Listar todas as tags do usuario' },
  { method:'POST',   path:'/tags',                 domain:'Tags',     auth:'jwt', desc:'Criar nova tag' },
  { method:'PUT',    path:'/tags/:id',             domain:'Tags',     auth:'jwt', desc:'Atualizar tag' },
  { method:'DELETE', path:'/tags/:id',             domain:'Tags',     auth:'jwt', desc:'Deletar tag' },
  { method:'POST',   path:'/tags/:id/resources',   domain:'Tags',     auth:'jwt', desc:'Adicionar recurso a uma tag' },
  { method:'DELETE', path:'/tags/:id/resources/:resourceType/:resourceId', domain:'Tags', auth:'jwt', desc:'Remover recurso de uma tag' },
  { method:'GET',    path:'/resources/:resourceType/:resourceId/tags', domain:'Tags', auth:'jwt', desc:'Listar todas as tags de um recurso' },

  // Step Templates (5)
  { method:'GET',    path:'/step-templates',       domain:'Step Templates', auth:'jwt', desc:'Listar templates de step reutilizaveis' },
  { method:'POST',   path:'/step-templates',       domain:'Step Templates', auth:'jwt', desc:'Criar template de step' },
  { method:'GET',    path:'/step-templates/:id',   domain:'Step Templates', auth:'jwt', desc:'Obter template por ID' },
  { method:'PUT',    path:'/step-templates/:id',   domain:'Step Templates', auth:'jwt', desc:'Atualizar template de step' },
  { method:'DELETE', path:'/step-templates/:id',   domain:'Step Templates', auth:'jwt', desc:'Deletar template de step' },

  // Attachments (1)
  { method:'POST',   path:'/conversations/:id/attachments', domain:'Attachments', auth:'jwt', desc:'Upload de imagens para conversa (multipart)' },

  // Import (1)
  { method:'POST',   path:'/import-repo',          domain:'Import',   auth:'jwt', desc:'Scan GitHub repo e bulk-import skills, agents, rules' },
];

// Domain config (icon + gradient color for header)
const DOMAIN_CONFIG = {
  'Auth':            { icon:'\u{1F512}', bg:'var(--bg-info)' },
  'Health':          { icon:'\u{1F49A}', bg:'var(--bg-success)' },
  'Workflows':       { icon:'\u{1F504}', bg:'rgba(139,92,246,0.1)' },
  'Conversations':   { icon:'\u{1F4AC}', bg:'var(--bg-info)' },
  'Execution':       { icon:'\u26A1',    bg:'var(--bg-warning)' },
  'Feedback':        { icon:'\u{1F44D}', bg:'rgba(236,72,153,0.1)' },
  'Metrics':         { icon:'\u{1F4CA}', bg:'var(--bg-success)' },
  'MCP Servers':     { icon:'\u{1F5A5}', bg:'rgba(99,102,241,0.1)' },
  'Skills':          { icon:'\u2B50',    bg:'var(--bg-warning)' },
  'Agents':          { icon:'\u{1F916}', bg:'rgba(139,92,246,0.1)' },
  'Rules':           { icon:'\u{1F4CB}', bg:'rgba(236,72,153,0.1)' },
  'Plugins':         { icon:'\u{1F50C}', bg:'rgba(192,132,252,0.1)' },
  'Hooks':           { icon:'\u{1FA9D}', bg:'rgba(132,204,22,0.1)' },
  'Triggers':        { icon:'\u23F0',    bg:'var(--bg-warning)' },
  'Webhooks':        { icon:'\u{1F514}', bg:'rgba(14,165,233,0.1)' },
  'API Keys':        { icon:'\u{1F511}', bg:'var(--bg-warning)' },
  'Git':             { icon:'\u{1F33F}', bg:'rgba(249,115,22,0.1)' },
  'Git Sources':     { icon:'\u{1F4C2}', bg:'rgba(6,182,212,0.1)' },
  'Admin':           { icon:'\u{1F6E1}', bg:'var(--bg-danger)' },
  'Tags':            { icon:'\u{1F3F7}', bg:'rgba(168,85,247,0.1)' },
  'Step Templates':  { icon:'\u{1F9E9}', bg:'var(--bg-accent-subtle)' },
  'Attachments':     { icon:'\u{1F4CE}', bg:'rgba(100,116,139,0.1)' },
  'Import':          { icon:'\u{1F4E5}', bg:'rgba(6,182,212,0.1)' },
};

// State
let activeMethod = 'ALL';
let activeDomain = 'ALL';
let searchQuery = '';

// Ordered domain list
const DOMAIN_ORDER = [];
ENDPOINTS.forEach(e => { if (!DOMAIN_ORDER.includes(e.domain)) DOMAIN_ORDER.push(e.domain); });

// --- Render functions ---

function renderStats() {
  const total = ENDPOINTS.length;
  const methods = {};
  ENDPOINTS.forEach(e => { methods[e.method] = (methods[e.method] || 0) + 1; });

  const items = [
    { label:'Total',  value:total,              cls:'badge-teal' },
    { label:'GET',    value:methods.GET||0,     cls:'badge-blue' },
    { label:'POST',   value:methods.POST||0,    cls:'badge-green' },
    { label:'PUT',    value:methods.PUT||0,     cls:'badge-amber' },
    { label:'PATCH',  value:methods.PATCH||0,   cls:'badge-purple' },
    { label:'DELETE', value:methods.DELETE||0,   cls:'badge-red' },
    { label:'Dominios', value:DOMAIN_ORDER.length, cls:'badge-gray' },
  ];

  document.getElementById('apiStats').innerHTML = items.map(i => `
    <div class="stat-box">
      <div class="stat-value" data-count="${i.value}">${i.value}</div>
      <div class="stat-label">${i.label}</div>
    </div>
  `).join('');
}

function renderDomainTabs() {
  const container = document.getElementById('domainTabs');
  let html = `<button class="domain-tab ${activeDomain==='ALL'?'active':''}" onclick="setDomain('ALL')">Todos <span class="count">${ENDPOINTS.length}</span></button>`;

  DOMAIN_ORDER.forEach(d => {
    const count = ENDPOINTS.filter(e => e.domain === d).length;
    const cfg = DOMAIN_CONFIG[d] || { icon:'\u{1F4E6}' };
    html += `<button class="domain-tab ${activeDomain===d?'active':''}" onclick="setDomain('${d}')">${cfg.icon} ${d} <span class="count">${count}</span></button>`;
  });

  container.innerHTML = html;
}

function getFiltered() {
  return ENDPOINTS.filter(e => {
    if (activeMethod !== 'ALL' && e.method !== activeMethod) return false;
    if (activeDomain !== 'ALL' && e.domain !== activeDomain) return false;
    if (searchQuery) {
      const q = searchQuery.toLowerCase();
      return e.path.toLowerCase().includes(q) ||
             e.desc.toLowerCase().includes(q) ||
             e.domain.toLowerCase().includes(q) ||
             e.method.toLowerCase().includes(q);
    }
    return true;
  });
}

function highlightPath(path) {
  return path.replace(/:([a-zA-Z]+)/g, '<span class="param">:$1</span>');
}

function authBadge(auth) {
  if (auth === 'admin') return '<span class="endpoint-auth auth-admin">ADMIN</span>';
  if (auth === 'jwt') return '<span class="endpoint-auth auth-jwt">JWT</span>';
  return '<span class="endpoint-auth auth-public">PUBLIC</span>';
}

function renderEndpoints() {
  const filtered = getFiltered();
  const countEl = document.getElementById('searchCount');

  if (searchQuery || activeMethod !== 'ALL' || activeDomain !== 'ALL') {
    countEl.textContent = filtered.length + ' / ' + ENDPOINTS.length;
  } else {
    countEl.textContent = '';
  }

  // Group by domain
  const groups = {};
  DOMAIN_ORDER.forEach(d => { groups[d] = []; });
  filtered.forEach(e => {
    if (!groups[e.domain]) groups[e.domain] = [];
    groups[e.domain].push(e);
  });

  const container = document.getElementById('endpointPanels');

  if (filtered.length === 0) {
    container.innerHTML = '<div class="no-results"><div class="no-results-icon">&#128269;</div><h3>Nenhum endpoint encontrado</h3><p style="margin-top:0.5rem;color:var(--text-muted);">Tente ajustar os filtros ou o termo de busca.</p></div>';
    return;
  }

  let html = '';
  DOMAIN_ORDER.forEach(domain => {
    const items = groups[domain];
    if (!items || items.length === 0) return;
    const cfg = DOMAIN_CONFIG[domain] || { icon:'\u{1F4E6}', bg:'var(--bg-card)' };

    html += `
    <div class="card" style="margin-bottom:1.25rem;padding:0;overflow:hidden;">
      <div class="domain-panel-header" style="padding:1rem 1.25rem 0.5rem;">
        <div class="domain-icon" style="background:${cfg.bg}">${cfg.icon}</div>
        <span class="domain-panel-title">${domain}</span>
        <span class="domain-panel-count">${items.length} endpoint${items.length>1?'s':''}</span>
      </div>
      <div>
        ${items.map(e => `
        <div class="endpoint-row">
          <div><span class="method-badge method-${e.method}">${e.method}</span></div>
          <div>
            <span class="endpoint-path">${highlightPath(e.path)}</span>
            ${authBadge(e.auth)}
            <div class="endpoint-desc">${e.desc}</div>
          </div>
        </div>
        `).join('')}
      </div>
    </div>`;
  });

  container.innerHTML = html;
}

// --- Interaction ---

function setMethodFilter(method) {
  activeMethod = method;
  document.querySelectorAll('.method-filter').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.method === method);
  });
  renderEndpoints();
}

function setDomain(domain) {
  activeDomain = domain;
  renderDomainTabs();
  renderEndpoints();
}

// Search input
document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value;
  renderEndpoints();
});

// Keyboard shortcuts
document.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
    e.preventDefault();
    document.getElementById('searchInput').focus();
  }
  if (e.key === 'Escape') {
    const input = document.getElementById('searchInput');
    if (document.activeElement === input) {
      input.value = '';
      searchQuery = '';
      renderEndpoints();
      input.blur();
    }
  }
});

// Init
renderStats();
renderDomainTabs();
renderEndpoints();
  </script>
</body>
</html>
