<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>03 - Banco de Dados | Orquetrador Claude System Map</title>
  <link rel="stylesheet" href="shared.css">
  <style>
    .erd-container {
      overflow: auto;
      border: 1px solid var(--border-color);
      border-radius: 12px;
      background: var(--bg-secondary);
      position: relative;
      max-height: 80vh;
    }
    .erd-canvas {
      min-width: 100%;
      padding: 2rem;
      display: grid;
      gap: 1.5rem;
    }
    .group-section {
      border: 1px solid var(--border-color);
      border-radius: 12px;
      padding: 1.25rem;
      background: var(--bg-primary);
    }
    .group-section-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .group-tables {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 0.75rem;
    }
    .tbl-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      overflow: hidden;
      transition: all 0.25s;
      cursor: pointer;
    }
    .tbl-card:hover { border-color: rgba(13,148,136,0.5); box-shadow: 0 0 15px rgba(13,148,136,0.1); }
    .tbl-card.highlight { border-color: #2dd4bf; box-shadow: 0 0 20px rgba(13,148,136,0.2); }
    .tbl-card.dimmed { opacity: 0.3; }
    .tbl-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 0.85rem;
      border-bottom: 1px solid var(--border-color);
      background: rgba(13,148,136,0.05);
    }
    .tbl-name {
      font-weight: 700;
      font-size: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-accent);
    }
    .tbl-meta {
      display: flex;
      gap: 0.4rem;
      align-items: center;
    }
    .tbl-meta .badge { font-size: 0.65rem; padding: 0.1rem 0.45rem; }
    .tbl-fields {
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s ease, padding 0.35s ease;
    }
    .tbl-card.open .tbl-fields {
      max-height: 2000px;
      padding: 0.5rem 0;
    }
    .tbl-field {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.25rem 0.85rem;
      font-size: 0.78rem;
      transition: background 0.15s;
    }
    .tbl-field:hover { background: rgba(255,255,255,0.02); }
    .tbl-field-name {
      font-family: 'JetBrains Mono', monospace;
      color: var(--text-primary);
      min-width: 140px;
    }
    .tbl-field-type {
      font-family: 'JetBrains Mono', monospace;
      color: #67e8f9;
      font-size: 0.72rem;
    }
    .tbl-field-badge {
      font-size: 0.6rem;
      padding: 0.05rem 0.35rem;
      border-radius: 4px;
      font-weight: 600;
    }
    .badge-pk { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .badge-fk { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }
    .badge-uq { background: rgba(59,130,246,0.15); color: #60a5fa; border: 1px solid rgba(59,130,246,0.3); }
    .badge-opt { color: var(--text-muted); font-size: 0.6rem; }
    .tbl-relations {
      padding: 0.5rem 0.85rem;
      border-top: 1px solid var(--border-color);
    }
    .tbl-rel {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.72rem;
      color: var(--text-secondary);
      padding: 0.15rem 0;
    }
    .tbl-rel-arrow { color: var(--text-accent); font-weight: 700; }
    .tbl-rel-target {
      font-family: 'JetBrains Mono', monospace;
      color: #a78bfa;
      cursor: pointer;
    }
    .tbl-rel-target:hover { color: #c4b5fd; text-decoration: underline; }
    .tbl-preview {
      padding: 0.5rem 0.85rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }
    .tbl-preview-field {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.03);
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
    }
    /* Stats */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 1rem;
      margin-bottom: 2rem;
    }
    .stat-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }
    .stat-num {
      font-size: 2rem;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-lbl { color: var(--text-secondary); font-size: 0.8rem; margin-top: 0.2rem; }
    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }
    .toolbar-search {
      flex: 1;
      min-width: 200px;
      padding: 0.6rem 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-primary);
      font-size: 0.85rem;
      font-family: inherit;
      outline: none;
    }
    .toolbar-search:focus { border-color: var(--border-accent); }
    .toolbar-btn {
      padding: 0.5rem 0.85rem;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      color: var(--text-secondary);
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      font-family: inherit;
      white-space: nowrap;
    }
    .toolbar-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }
    .toolbar-btn.active { background: rgba(13,148,136,0.15); color: #2dd4bf; border-color: rgba(13,148,136,0.3); }
    /* Enum grid */
    .enum-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }
    .enum-card {
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 10px;
      overflow: hidden;
    }
    .enum-name {
      padding: 0.6rem 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      font-weight: 600;
      font-size: 0.82rem;
      color: #fbbf24;
      background: rgba(251,191,36,0.05);
      border-bottom: 1px solid var(--border-color);
    }
    .enum-values { padding: 0.5rem 0.85rem; }
    .enum-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.72rem;
      color: #86efac;
      padding: 0.15rem 0;
    }
    /* Tabs */
    .view-tabs {
      display: flex;
      gap: 0.25rem;
      border-bottom: 1px solid var(--border-color);
      margin-bottom: 1.5rem;
    }
    .view-tab {
      padding: 0.7rem 1.25rem;
      background: none;
      border: none;
      color: var(--text-secondary);
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-family: inherit;
      transition: all 0.2s;
    }
    .view-tab:hover { color: var(--text-primary); }
    .view-tab.active { color: var(--text-accent); border-bottom-color: var(--bg-accent); }
    .view-panel { display: none; }
    .view-panel.active { display: block; }
    /* Relationship map */
    .rel-map-table { width: 100%; }
    .rel-map-table th { font-size: 0.75rem; }
    .rel-map-table td { font-size: 0.8rem; font-family: 'JetBrains Mono', monospace; }
    .rel-type { font-size: 0.7rem; padding: 0.1rem 0.4rem; border-radius: 4px; }
    .rel-1n { background: rgba(59,130,246,0.15); color: #60a5fa; }
    .rel-11 { background: rgba(34,197,94,0.15); color: #4ade80; }
    .rel-nm { background: rgba(245,158,11,0.15); color: #fbbf24; }
    @media (max-width: 768px) {
      .group-tables { grid-template-columns: 1fr; }
      .enum-grid { grid-template-columns: 1fr; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="page-header">
      <div class="breadcrumb">
        <a href="index.html">System Map</a><span>›</span><span>Banco de Dados</span>
      </div>
      <h1>Banco de Dados — Schema Visual</h1>
      <p class="subtitle">Mapa completo das 47 tabelas, 15 enums e ~60 relacionamentos do PostgreSQL via Prisma ORM</p>
    </div>

    <!-- Stats -->
    <div class="stats-row" id="stats-row"></div>

    <!-- Tabs -->
    <div class="view-tabs">
      <button class="view-tab active" data-view="erd">Schema Visual</button>
      <button class="view-tab" data-view="relations">Relacionamentos</button>
      <button class="view-tab" data-view="enums">Enums</button>
    </div>

    <!-- Toolbar (for ERD tab) -->
    <div class="toolbar" id="toolbar">
      <input type="text" class="toolbar-search" id="search" placeholder="Buscar tabela ou campo...">
      <button class="toolbar-btn active" data-group="all">Todos</button>
    </div>

    <!-- ERD Panel -->
    <div class="view-panel active" id="panel-erd">
      <div class="erd-container">
        <div class="erd-canvas" id="erd-canvas"></div>
      </div>
    </div>

    <!-- Relations Panel -->
    <div class="view-panel" id="panel-relations">
      <div class="table-container">
        <table class="rel-map-table" id="rel-table">
          <thead>
            <tr>
              <th>Origem</th>
              <th>Campo FK</th>
              <th>Tipo</th>
              <th>Destino</th>
              <th>On Delete</th>
            </tr>
          </thead>
          <tbody id="rel-tbody"></tbody>
        </table>
      </div>
    </div>

    <!-- Enums Panel -->
    <div class="view-panel" id="panel-enums">
      <div class="enum-grid" id="enum-grid"></div>
    </div>
  </div>

  <script src="shared.js"></script>
  <script>
  // ================================================================
  // SCHEMA DATA — Extracted from Prisma schema (47 models, 15 enums)
  // ================================================================
  const GROUPS = {
    identity: { label: 'Identity & Access', color: '#22c55e', icon: '🔐' },
    workflows: { label: 'Workflows', color: '#3b82f6', icon: '📋' },
    conversations: { label: 'Conversations', color: '#8b5cf6', icon: '💬' },
    execution: { label: 'Execution Engine', color: '#f59e0b', icon: '⚙️' },
    resources: { label: 'Resources', color: '#0d9488', icon: '🧩' },
    automation: { label: 'Automation', color: '#ec4899', icon: '⏰' },
    observability: { label: 'Observability', color: '#ef4444', icon: '📊' },
    tagging: { label: 'Tags & Dependencies', color: '#64748b', icon: '🏷️' },
    joins: { label: 'Join Tables', color: '#475569', icon: '🔗' },
  };

  const ENUMS = {
    UserStatus: ['active','suspended','invited'],
    UserRole: ['admin','developer','viewer'],
    WorkflowStatus: ['draft','active','archived'],
    ConversationStatus: ['active','completed','failed','archived'],
    ErrorCategory: ['timeout','rate_limit','context_overflow','budget_exceeded','tool_error','permission_denied','unknown'],
    StepErrorHandler: ['fail','skip','fallback','continue_next'],
    TriggerType: ['manual','cron','webhook_inbound','event','git_push'],
    OveragePolicy: ['block','warn','allow'],
    ResourceType: ['mcp_server','skill','agent','rule','hook','plugin','workflow'],
    ExecutionStateStatus: ['queued','running','completed','failed','paused','cancelled'],
    ExecutionAggregateStatus: ['running','completed','failed'],
    ScheduledExecutionStatus: ['pending','running','completed','failed','cancelled'],
    ExecutionLogEventType: ['step_start','step_complete','step_fail','step_error','step_skip','workflow_start','workflow_complete','workflow_fail','retry','pause','resume','cancel'],
    DeliveryStatus: ['pending','success','failed'],
    TraceResultStatus: ['success','error','timeout','cancelled','needs_input','interrupted'],
  };

  // Table definitions: name, dbName, group, fields[], relations[]
  const TABLES = [
    // === IDENTITY ===
    { name: 'User', db: 'users', group: 'identity', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'email', t: 'String', uq: true },
      { n: 'passwordHash', t: 'String' },
      { n: 'name', t: 'String?' },
      { n: 'status', t: 'UserStatus', def: 'active' },
      { n: 'role', t: 'UserRole', def: 'developer' },
      { n: 'preferences', t: 'Json' },
      { n: 'lastLoginAt', t: 'DateTime?' },
      { n: 'maxConcurrentExecutions', t: 'Int', def: '5' },
      { n: 'createdAt', t: 'DateTime' },
      { n: 'updatedAt', t: 'DateTime' },
    ], rels: [
      { type: '1:N', to: 'Workflow' }, { type: '1:N', to: 'Conversation' },
      { type: '1:N', to: 'McpServer' }, { type: '1:N', to: 'Skill' },
      { type: '1:N', to: 'Agent' }, { type: '1:N', to: 'Rule' },
      { type: '1:N', to: 'Plugin' }, { type: '1:N', to: 'Hook' },
      { type: '1:N', to: 'ApiKey' }, { type: '1:1', to: 'UserTokenBudget' },
      { type: '1:N', to: 'Webhook' }, { type: '1:N', to: 'GitAccount' },
      { type: '1:N', to: 'Tag' }, { type: '1:N', to: 'AuditLog' },
      { type: '1:N', to: 'TokenUsageHistory' }, { type: '1:N', to: 'HourlyTokenUsage' },
      { type: '1:N', to: 'ExecutionRating' }, { type: '1:N', to: 'PromptVersion' },
      { type: '1:N', to: 'StepTemplate' },
    ]},
    { name: 'ApiKey', db: 'api_keys', group: 'identity', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'name', t: 'String' },
      { n: 'keyHash', t: 'String', uq: true },
      { n: 'prefix', t: 'String' },
      { n: 'scopes', t: 'Json' },
      { n: 'rateLimit', t: 'Int?' },
      { n: 'usageCount', t: 'Int', def: '0' },
      { n: 'ipWhitelist', t: 'Json' },
      { n: 'lastUsedAt', t: 'DateTime?' },
      { n: 'expiresAt', t: 'DateTime?' },
      { n: 'revoked', t: 'Boolean', def: 'false' },
      { n: 'userId', t: 'String', fk: 'User' },
    ], rels: [{ type: 'N:1', to: 'User', fk: 'userId', del: 'Cascade' }]},
    { name: 'UserTokenBudget', db: 'user_token_budgets', group: 'identity', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'dailyLimit', t: 'Int', def: '5M' },
      { n: 'monthlyLimit', t: 'Int', def: '100M' },
      { n: 'currentDailyUsage', t: 'Int', def: '0' },
      { n: 'currentMonthlyUsage', t: 'Int', def: '0' },
      { n: 'lastDailyResetAt', t: 'DateTime' },
      { n: 'lastMonthlyResetAt', t: 'DateTime' },
      { n: 'dailyCostLimitUsd', t: 'Float?' },
      { n: 'monthlyCostLimitUsd', t: 'Float?' },
      { n: 'overagePolicy', t: 'OveragePolicy', def: 'block' },
      { n: 'userId', t: 'String', fk: 'User', uq: true },
    ], rels: [{ type: '1:1', to: 'User', fk: 'userId', del: 'Cascade' }]},
    { name: 'GitAccount', db: 'git_accounts', group: 'identity', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'label', t: 'String' },
      { n: 'token', t: 'String' },
      { n: 'username', t: 'String?' },
      { n: 'userId', t: 'String', fk: 'User' },
    ], rels: [
      { type: 'N:1', to: 'User', fk: 'userId', del: 'Cascade' },
      { type: '1:N', to: 'ProjectGitMapping' },
    ]},
    { name: 'ProjectGitMapping', db: 'project_git_mappings', group: 'identity', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'projectPath', t: 'String', uq: true },
      { n: 'gitAccountId', t: 'String', fk: 'GitAccount' },
    ], rels: [{ type: 'N:1', to: 'GitAccount', fk: 'gitAccountId', del: 'Cascade' }]},

    // === WORKFLOWS ===
    { name: 'Workflow', db: 'workflows', group: 'workflows', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'name', t: 'String' },
      { n: 'description', t: 'String?' },
      { n: 'type', t: 'String', def: 'sequential' },
      { n: 'status', t: 'WorkflowStatus', def: 'active' },
      { n: 'tags', t: 'Json' },
      { n: 'lastExecutedAt', t: 'DateTime?' },
      { n: 'executionCount', t: 'Int', def: '0' },
      { n: 'userId', t: 'String', fk: 'User' },
    ], rels: [
      { type: 'N:1', to: 'User', fk: 'userId', del: 'Cascade' },
      { type: '1:N', to: 'WorkflowStep' },
      { type: '1:N', to: 'Conversation' },
      { type: '1:N', to: 'WorkflowVersion' },
      { type: '1:N', to: 'WorkflowTrigger' },
    ]},
    { name: 'WorkflowStep', db: 'workflow_steps', group: 'workflows', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'workflowId', t: 'String', fk: 'Workflow' },
      { n: 'name', t: 'String' },
      { n: 'baseUrl', t: 'String' },
      { n: 'stepOrder', t: 'Int' },
      { n: 'systemPrompt', t: 'String?' },
      { n: 'useBasePrompt', t: 'Boolean', def: 'true' },
      { n: 'conditions', t: 'Json' },
      { n: 'maxRetries', t: 'Int', def: '0' },
      { n: 'dependsOn', t: 'Json' },
      { n: 'validators', t: 'Json' },
      { n: 'templateId', t: 'String?', fk: 'StepTemplate' },
      { n: 'outputVariables', t: 'Json' },
      { n: 'inputVariables', t: 'Json' },
      { n: 'backend', t: 'String', def: 'claude' },
      { n: 'model', t: 'String?' },
      { n: 'timeout', t: 'Int?', def: '0' },
      { n: 'errorHandler', t: 'StepErrorHandler', def: 'fail' },
      { n: 'skipCondition', t: 'String?' },
      { n: 'subWorkflowId', t: 'String?', fk: 'Workflow' },
      { n: 'outputSchema', t: 'Json?' },
    ], rels: [
      { type: 'N:1', to: 'Workflow', fk: 'workflowId', del: 'Cascade' },
      { type: 'N:1', to: 'StepTemplate', fk: 'templateId', del: 'SetNull' },
      { type: 'N:1', to: 'Workflow', fk: 'subWorkflowId', del: 'SetNull', label: 'SubWorkflow' },
      { type: '1:N', to: 'Message' }, { type: '1:N', to: 'ConversationSession' },
      { type: '1:N', to: 'StepMemory' }, { type: '1:N', to: 'ExecutionLog' },
      { type: '1:N', to: 'ExecutionTrace' }, { type: '1:N', to: 'PromptVersion' },
    ]},
    { name: 'WorkflowVersion', db: 'workflow_versions', group: 'workflows', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'version', t: 'Int' },
      { n: 'snapshot', t: 'Json' },
      { n: 'diff', t: 'Json?' },
      { n: 'changelog', t: 'String?' },
      { n: 'workflowId', t: 'String', fk: 'Workflow' },
    ], rels: [{ type: 'N:1', to: 'Workflow', fk: 'workflowId', del: 'Cascade' }]},
    { name: 'StepTemplate', db: 'step_templates', group: 'workflows', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'name', t: 'String' },
      { n: 'description', t: 'String?' },
      { n: 'baseUrl', t: 'String' },
      { n: 'systemPrompt', t: 'String?' },
      { n: 'conditions', t: 'Json' },
      { n: 'resourceIds', t: 'Json' },
      { n: 'userId', t: 'String', fk: 'User' },
    ], rels: [
      { type: 'N:1', to: 'User', fk: 'userId', del: 'Cascade' },
      { type: '1:N', to: 'WorkflowStep' },
    ]},

    // === CONVERSATIONS ===
    { name: 'Conversation', db: 'conversations', group: 'conversations', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'title', t: 'String?' },
      { n: 'projectPath', t: 'String?' },
      { n: 'status', t: 'ConversationStatus', def: 'active' },
      { n: 'totalTokensUsed', t: 'Int', def: '0' },
      { n: 'totalCostUsd', t: 'Float?' },
      { n: 'lastMessageAt', t: 'DateTime?' },
      { n: 'isArchived', t: 'Boolean', def: 'false' },
      { n: 'tags', t: 'Json' },
      { n: 'parentId', t: 'String?', fk: 'Conversation' },
      { n: 'userId', t: 'String', fk: 'User' },
      { n: 'workflowId', t: 'String', fk: 'Workflow' },
      { n: 'currentStepId', t: 'String?', fk: 'WorkflowStep' },
    ], rels: [
      { type: 'N:1', to: 'User', fk: 'userId', del: 'Cascade' },
      { type: 'N:1', to: 'Workflow', fk: 'workflowId', del: 'Cascade' },
      { type: 'N:1', to: 'WorkflowStep', fk: 'currentStepId', del: 'SetNull' },
      { type: 'self', to: 'Conversation', fk: 'parentId', label: 'Fork' },
      { type: '1:N', to: 'Message' }, { type: '1:N', to: 'ConversationSession' },
      { type: '1:N', to: 'StepMemory' }, { type: '1:N', to: 'ExecutionState' },
      { type: '1:N', to: 'ExecutionLog' }, { type: '1:N', to: 'ExecutionTrace' },
      { type: '1:N', to: 'MessageFeedback' },
    ]},
    { name: 'Message', db: 'messages', group: 'conversations', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'role', t: 'String' },
      { n: 'content', t: 'String' },
      { n: 'selectedForContext', t: 'Boolean', def: 'false' },
      { n: 'metadata', t: 'Json?' },
      { n: 'tokenCount', t: 'Int?' },
      { n: 'model', t: 'String?' },
      { n: 'conversationId', t: 'String', fk: 'Conversation' },
      { n: 'stepId', t: 'String?', fk: 'WorkflowStep' },

    { name: 'WorkflowStepRule', db: 'workflow_step_rules', group: 'joins', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'stepId', t: 'String', fk: 'WorkflowStep' },
      { n: 'ruleId', t: 'String', fk: 'Rule' },
      { n: 'order', t: 'Int', def: '0' },
    ], rels: [
      { type: 'N:1', to: 'WorkflowStep', fk: 'stepId', del: 'Cascade' },
      { type: 'N:1', to: 'Rule', fk: 'ruleId', del: 'Cascade' },
    ]},
    { name: 'WorkflowStepHook', db: 'workflow_step_hooks', group: 'joins', fields: [
      { n: 'id', t: 'String', pk: true },
      { n: 'stepId', t: 'String', fk: 'WorkflowStep' },
      { n: 'hookId', t: 'String', fk: 'Hook' },
      { n: 'order', t: 'Int', def: '0' },
    ], rels: [
      { type: 'N:1', to: 'WorkflowStep', fk: 'stepId', del: 'Cascade' },
      { type: 'N:1', to: 'Hook', fk: 'hookId', del: 'Cascade' },
    ]},
  ];

  // ================================================================
  // RENDER ENGINE
  // ================================================================
  let activeGroup = 'all';
  let searchQuery = '';

  function renderStats() {
    const totalFields = TABLES.reduce((s, t) => s + t.fields.length, 0);
    const totalRels = TABLES.reduce((s, t) => s + t.rels.filter(r => r.fk).length, 0);
    const totalIndexes = TABLES.reduce((s, t) => s + t.fields.filter(f => f.fk || f.uq).length, 0);
    const stats = [
      { n: TABLES.length, l: 'Tabelas', c: '#2dd4bf' },
      { n: Object.keys(ENUMS).length, l: 'Enums', c: '#fbbf24' },
      { n: totalFields, l: 'Campos', c: '#60a5fa' },
      { n: totalRels, l: 'Foreign Keys', c: '#a78bfa' },
      { n: Object.keys(GROUPS).length, l: 'Dominios', c: '#f472b6' },
      { n: totalIndexes, l: 'Indexes', c: '#4ade80' },
    ];
    document.getElementById('stats-row').innerHTML = stats.map(s =>
      `<div class="stat-card"><div class="stat-num" style="color:${s.c}">${s.n}</div><div class="stat-lbl">${s.l}</div></div>`
    ).join('');
  }

  function renderGroupButtons() {
    const toolbar = document.getElementById('toolbar');
    const search = toolbar.querySelector('.toolbar-search');
    const allBtn = toolbar.querySelector('[data-group="all"]');
    let html = '';
    for (const [gid, g] of Object.entries(GROUPS)) {
      const count = TABLES.filter(t => t.group === gid).length;
      html += `<button class="toolbar-btn" data-group="${gid}" style="border-left:3px solid ${g.color}">${g.icon} ${g.label} <span style="color:var(--text-muted);font-size:0.7rem">(${count})</span></button>`;
    }
    allBtn.insertAdjacentHTML('afterend', html);
  }

  function renderERD() {
    const canvas = document.getElementById('erd-canvas');
    let html = '';
    for (const [gid, g] of Object.entries(GROUPS)) {
      const tables = TABLES.filter(t => t.group === gid);
      if (activeGroup !== 'all' && activeGroup !== gid) continue;
      const filtered = tables.filter(t => {
        if (!searchQuery) return true;
        const q = searchQuery.toLowerCase();
        return t.name.toLowerCase().includes(q) || t.db.toLowerCase().includes(q) ||
          t.fields.some(f => f.n.toLowerCase().includes(q) || f.t.toLowerCase().includes(q));
      });
      if (filtered.length === 0) continue;
      html += `<div class="group-section" data-group="${gid}">
        <div class="group-section-title" style="color:${g.color};border-color:${g.color}">
          <span>${g.icon}</span> ${g.label}
          <span style="font-weight:400;color:var(--text-muted);font-size:0.7rem;text-transform:none">${filtered.length} tabela${filtered.length>1?'s':''}</span>
        </div>
        <div class="group-tables">${filtered.map(t => renderTableCard(t, g)).join('')}</div>
      </div>`;
    }
    canvas.innerHTML = html || '<div style="padding:3rem;text-align:center;color:var(--text-muted)">Nenhuma tabela encontrada</div>';
    // Re-bind events
    canvas.querySelectorAll('.tbl-card').forEach(card => {
      card.querySelector('.tbl-card-header').addEventListener('click', () => card.classList.toggle('open'));
    });
    canvas.querySelectorAll('.tbl-rel-target').forEach(el => {
      el.addEventListener('click', (e) => {
        e.stopPropagation();
        highlightTable(el.dataset.target);
      });
    });
  }

  function renderTableCard(t, g) {
    const fkCount = t.fields.filter(f => f.fk).length;
    const relCount = t.rels.length;
    const previewFields = t.fields.filter(f => !f.pk && !f.fk).slice(0, 5);
    return `<div class="tbl-card" data-table="${t.name}" id="tbl-${t.name}">
      <div class="tbl-card-header" style="border-left:3px solid ${g.color}">
        <div>
          <span class="tbl-name">${t.name}</span>
          <div style="font-size:0.68rem;color:var(--text-muted);font-family:'JetBrains Mono',monospace">${t.db}</div>
        </div>
        <div class="tbl-meta">
          <span class="badge badge-gray">${t.fields.length} cols</span>
          ${fkCount ? `<span class="badge badge-purple">${fkCount} FK</span>` : ''}
          ${relCount ? `<span class="badge badge-teal">${relCount} rel</span>` : ''}
        </div>
      </div>
      <div class="tbl-preview">${previewFields.map(f => `<span class="tbl-preview-field">${f.n}</span>`).join('')}</div>
      <div class="tbl-fields">
        ${t.fields.map(f => `<div class="tbl-field">
          <span class="tbl-field-name">${f.n}</span>
          <span class="tbl-field-type">${f.t}</span>
          ${f.pk ? '<span class="tbl-field-badge badge-pk">PK</span>' : ''}
          ${f.fk ? `<span class="tbl-field-badge badge-fk">FK→${f.fk}</span>` : ''}
          ${f.uq ? '<span class="tbl-field-badge badge-uq">UQ</span>' : ''}
          ${f.def ? `<span class="badge-opt">=${f.def}</span>` : ''}
        </div>`).join('')}
        ${t.rels.length ? `<div class="tbl-relations">
          <div style="font-size:0.7rem;font-weight:600;color:var(--text-muted);margin-bottom:0.3rem;text-transform:uppercase;letter-spacing:0.05em">Relacionamentos</div>
          ${t.rels.map(r => `<div class="tbl-rel">
            <span class="rel-type ${r.type === '1:N' ? 'rel-1n' : r.type === '1:1' ? 'rel-11' : r.type === 'N:1' ? 'rel-1n' : 'rel-nm'}">${r.type}</span>
            <span class="tbl-rel-arrow">${r.type === 'N:1' ? '←' : '→'}</span>
            <span class="tbl-rel-target" data-target="${r.to}">${r.to}</span>
            ${r.fk ? `<span style="color:var(--text-muted);font-size:0.65rem">via ${r.fk}</span>` : ''}
            ${r.del ? `<span style="color:var(--text-muted);font-size:0.65rem">[${r.del}]</span>` : ''}
            ${r.label ? `<span style="color:#fbbf24;font-size:0.65rem">(${r.label})</span>` : ''}
          </div>`).join('')}
        </div>` : ''}
      </div>
    </div>`;
  }

  function highlightTable(name) {
    // Clear search, show all groups
    document.getElementById('search').value = '';
    searchQuery = '';
    activeGroup = 'all';
    document.querySelectorAll('.toolbar-btn').forEach(b => b.classList.remove('active'));
    document.querySelector('[data-group="all"]').classList.add('active');
    renderERD();
    setTimeout(() => {
      const el = document.getElementById('tbl-' + name);
      if (el) {
        el.classList.add('open', 'highlight');
        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        setTimeout(() => el.classList.remove('highlight'), 2000);
      }
    }, 100);
  }

  function renderRelationsTable() {
    const tbody = document.getElementById('rel-tbody');
    let rows = '';
    TABLES.forEach(t => {
      t.rels.filter(r => r.fk).forEach(r => {
        const typeClass = r.type === '1:1' ? 'rel-11' : r.type === 'N:1' ? 'rel-1n' : r.type === '1:N' ? 'rel-1n' : 'rel-nm';
        rows += `<tr>
          <td style="color:var(--text-accent)">${t.name}</td>
          <td>${r.fk}</td>
          <td><span class="rel-type ${typeClass}">${r.type}</span></td>
          <td style="color:#a78bfa">${r.to}</td>
          <td><span class="badge ${r.del === 'Cascade' ? 'badge-red' : 'badge-amber'}">${r.del || '-'}</span></td>
        </tr>`;
      });
    });
    tbody.innerHTML = rows;
  }

  function renderEnums() {
    const grid = document.getElementById('enum-grid');
    grid.innerHTML = Object.entries(ENUMS).map(([name, values]) =>
      `<div class="enum-card">
        <div class="enum-name">${name} <span style="color:var(--text-muted);font-weight:400">(${values.length})</span></div>
        <div class="enum-values">${values.map(v => `<div class="enum-val">${v}</div>`).join('')}</div>
      </div>`
    ).join('');
  }

  // ================================================================
  // EVENT HANDLERS
  // ================================================================
  // Tabs
  document.querySelectorAll('.view-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.view-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.view-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      document.getElementById('panel-' + tab.dataset.view).classList.add('active');
      document.getElementById('toolbar').style.display = tab.dataset.view === 'erd' ? 'flex' : 'none';
    });
  });

  // Group filter
  document.getElementById('toolbar').addEventListener('click', (e) => {
    const btn = e.target.closest('.toolbar-btn');
    if (!btn) return;
    document.querySelectorAll('.toolbar-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeGroup = btn.dataset.group;
    renderERD();
  });

  // Search
  document.getElementById('search').addEventListener('input', (e) => {
    searchQuery = e.target.value;
    renderERD();
  });

  // ================================================================
  // INIT
  // ================================================================
  renderStats();
  renderGroupButtons();
  renderERD();
  renderRelationsTable();
  renderEnums();
  </script>
</body>
</html>
